[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

[[headers]]
  for = "/index.html"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

# www → apex 301 redirect (path-preserving) for .tech domain
[[redirects]]
  from = "https://www.thispagedoesnotexist12345.tech/*"
  to = "https://thispagedoesnotexist12345.tech/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/api/seat-status"
  to = "/.netlify/functions/seat-status"
  status = 200

[[redirects]]
  from = "/api/seat-request"
  to = "/.netlify/functions/seat-request"
  status = 200

# One Page Studio — serve /Studio from the Studio subfolder
[[redirects]]
  from = "/ResumeOnePageStudio"
  to = "/Studio"
  status = 301
  force = true

[[redirects]]
  from = "/ResumeOnePageStudio/*"
  to = "/Studio/:splat"
  status = 301
  force = true
