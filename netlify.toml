[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # NOTION_SEAT_DB_ID and NOTION_DRIFT_REPORT_DB_ID are Notion database IDs, not secrets.
  # Omit from secrets scanning to prevent false-positive build failures.
  SECRETS_SCAN_OMIT_KEYS = "NOTION_SEAT_DB_ID,NOTION_DRIFT_REPORT_DB_ID,DEMO_FIRST_NAME,DEMO_LAST_NAME,DEMO_ACCOUNT_EMAIL,DEMO_FLIGHT_CODE,DEMO_SEAT_ID,DEMO_SEAT_IDS,DEMO_SEND_SECRET"
  # Supabase migration SQL contains role/policy/RPC terms that can trigger Netlify secret-scan false positives.
  # Keep scanning active elsewhere while excluding non-deployed database migration files.
  SECRETS_SCAN_OMIT_PATHS = "supabase/migrations"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=UTF-8"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

[[redirects]]
  from = "/api/seat-status"
  to = "/.netlify/functions/seat-status"
  status = 200

[[redirects]]
  from = "/api/seat-request"
  to = "/.netlify/functions/seat-request"
  status = 200

# Canonical entry point — /request-seat → seat request form
[[redirects]]
  from = "/request-seat"
  to = "/#seat-request-form"
  status = 301

# One Page Studio — serve /Studio from the Studio subfolder
[[redirects]]
  from = "/ResumeOnePageStudio"
  to = "/Studio"
  status = 301
  force = true

[[redirects]]
  from = "/ResumeOnePageStudio/*"
  to = "/Studio/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/api/set-departure"
  to = "/.netlify/functions/set-departure"
  status = 200

[[redirects]]
  from = "/api/verify-age"
  to = "/.netlify/functions/verify-age"
  status = 200

[[redirects]]
  from = "/api/seat/:id"
  to = "/.netlify/functions/seat?id=:id"
  status = 200

[[redirects]]
  from = "/api/seat"
  to = "/.netlify/functions/seat"
  status = 200


# Admin Tower — BLOCKER-03: Approve/Deny Flow
# Secured by x-admin-secret header (ADMIN_SECRET env var)
[[redirects]]
  from = "/api/admin-approve"
  to = "/.netlify/functions/admin-approve"
  status = 200

[[redirects]]
  from = "/api/admin-deny"
  to = "/.netlify/functions/admin-deny"
  status = 200

[[redirects]]
  from = "/api/waitlist-manifest"
  to = "/.netlify/functions/waitlist-manifest"
  status = 200

# Passenger Door — BLOCKER-07: Newsletter Landing + TUJ Seat Gate + ResumeFitCheck
# Receives passengers from the .us newsletter boarding_pass deep-link:
#   https://www.thispagedoesnotexist12345.com/door?seat_id=TUJ-XXXXXX
# Validates seat_id via /api/seat, then routes to Base44 ResumeFitCheck.
[[redirects]]
  from = "/door"
  to = "/door.html"
  status = 200

# BLOCKER-08: Alignment Loop — Notion ↔ SaaS Drift Detection + Repair
# Webhook trigger: POST /api/alignment-loop with x-webhook-secret header
# Cron trigger: every 5 minutes via Netlify scheduled functions for PAL-21 Application sync
[[redirects]]
  from = "/api/alignment-loop"
  to = "/.netlify/functions/alignment-loop"
  status = 200

[functions."alignment-loop"]
  schedule = "*/5 * * * *"

# signalwelcome_v1 — Beehiiv → SendGrid welcome runner for Gemini.
# Scheduled polling is cohort-gated in code and sends only when at least 5 eligible active subscribers exist.
[[redirects]]
  from = "/api/signalwelcome-runner"
  to = "/.netlify/functions/signalwelcome-runner"
  status = 200

[functions."signalwelcome-runner"]
  schedule = "0 * * * *"
