[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # Keep Netlify secrets-scan aligned with the current deploy scan surface.
  SECRETS_SCAN_OMIT_KEYS = "NOTION_SEAT_DB_ID,NOTION_DRIFT_REPORT_DB_ID,NOTION_JD_PIPELINE_DB_ID,BEEHIIV_PUB_ID,DEMO_FIRST_NAME,DEMO_LAST_NAME,DEMO_ACCOUNT_EMAIL,DEMO_FLIGHT_CODE,DEMO_SEAT_ID,DEMO_SEAT_IDS,DEMO_SEND_SECRET"
  SECRETS_SCAN_OMIT_PATHS = "supabase/migrations"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=UTF-8"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

[[redirects]]
  from = "/api/seat-status"
  to = "/.netlify/functions/seat-status"
  status = 200

[[redirects]]
  from = "/api/seat-request"
  to = "/.netlify/functions/seat-request"
  status = 200

[[redirects]]
  from = "/api/verify-age"
  to = "/.netlify/functions/verify-age"
  status = 200

[[redirects]]
  from = "/api/seat-ready"
  to = "/.netlify/functions/seat-ready"
  status = 200

[[redirects]]
  from = "/api/seat-map"
  to = "/.netlify/functions/seat-map"
  status = 200

[[redirects]]
  from = "/api/seat-claim"
  to = "/.netlify/functions/seat-claim"
  status = 200

[[redirects]]
  from = "/api/mission-control-bind"
  to = "/.netlify/functions/mission-control-bind"
  status = 200

# BLOCKER-08: Alignment Loop — Notion ↔ SaaS Drift Detection + Repair
# Webhook trigger: POST /api/alignment-loop with x-webhook-secret header
# Cron trigger: every 5 minutes via Netlify scheduled functions for PAL-21 Application sync
[[redirects]]
  from = "/api/alignment-loop"
  to = "/.netlify/functions/alignment-loop"
  status = 200

[functions."alignment-loop"]
  schedule = "*/5 * * * *"


# Passenger self-seat-selection entry point
[[redirects]]
  from = "/seat-selection"
  to = "/seat-selection.html"
  status = 200

# One Page Studio — serve /Studio from the Studio subfolder
[[redirects]]
  from = "/ResumeOnePageStudio"
  to = "/Studio"
  status = 301
  force = true

[[redirects]]
  from = "/ResumeOnePageStudio/*"
  to = "/Studio/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/request-seat"
  to = "/request-seat.html"
  status = 200

[[redirects]]
  from = "/request-seat/"
  to = "/request-seat.html"
  status = 200

[[redirects]]
  from = "/OnboardingPassport"
  to = "/onboardingpassport/"
  status = 200
  force = true

[[redirects]]
  from = "/OnboardingPassport/*"
  to = "/onboardingpassport/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/Studio"
  to = "/Studio/"
  status = 200
  force = true

[[redirects]]
  from = "/Studio/*"
  to = "/Studio/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/set-departure"
  to = "/.netlify/functions/set-departure"
  status = 200

[[redirects]]
  from = "/api/seat-ready"
  to = "/.netlify/functions/seat-ready"
  status = 200

[[redirects]]
  from = "/Dashboard"
  to = "/?status=boarded"
  status = 200
  force = true

[[redirects]]
  from = "/Dashboard/*"
  to = "/?status=boarded"
  status = 200
  force = true

[[redirects]]
  from = "/dashboard"
  to = "/?status=boarded"
  status = 200
  force = true

[[redirects]]
  from = "/dashboard/*"
  to = "/?status=boarded"
  status = 200
  force = true

[[redirects]]
  from = "/Passengers"
  to = "/"
  status = 200
  force = true

[[redirects]]
  from = "/Passengers/*"
  to = "/"
  status = 200
  force = true

[[redirects]]
  from = "/FlightLog"
  to = "/"
  status = 200
  force = true

[[redirects]]
  from = "/FlightLog/*"
  to = "/"
  status = 200
  force = true

[[redirects]]
  from = "/Applications"
  to = "/"
  status = 200
  force = true

[[redirects]]
  from = "/Applications/*"
  to = "/"
  status = 200
  force = true

[[redirects]]
  from = "/InterviewsAndFollowUps"
  to = "/"
  status = 200
  force = true

[[redirects]]
  from = "/InterviewsAndFollowUps/*"
  to = "/"
  status = 200
  force = true

[[redirects]]
  from = "/CommandCenter"
  to = "/"
  status = 200
  force = true

[[redirects]]
  from = "/CommandCenter/*"
  to = "/"
  status = 200
  force = true

# /Studio is served directly from Studio/index.html. Do not force-rewrite it to /,
# because boarding handoff URLs preserve seat_id/tuj_code on the Studio route.
