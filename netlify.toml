[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # Netlify secret-scan omits (SEC-08 / cf10642+):
  #   OMIT_KEYS — env var names whose values are public IDs or demo fixtures (not JWTs/API keys).
  #   OMIT_PATHS — non-runtime or reference-only paths (migrations, template HTML, env template).
  # Do NOT add SUPABASE_SERVICE_ROLE_KEY, SENDGRID_API_KEY, or other true secrets here.
  SECRETS_SCAN_OMIT_KEYS = "NOTION_SEAT_DB_ID,NOTION_DRIFT_REPORT_DB_ID,NOTION_JD_PIPELINE_DB_ID,NOTION_SEAT_REQUEST_DATABASE_ID,BEEHIIV_PUB_ID,ACTIVE_FLIGHT_CODE,DEMO_FIRST_NAME,DEMO_LAST_NAME,DEMO_ACCOUNT_EMAIL,DEMO_FLIGHT_CODE,DEMO_SEAT_ID,DEMO_SEAT_IDS,DEMO_SEND_SECRET,SENDGRID_TEMPLATE_SEAT_REQUEST,SENDGRID_TEMPLATE_INTERNAL_SIGNUP,SENDGRID_TEMPLATE_NEXT_FLIGHT_WAITLIST,SENDGRID_TEMPLATE_OPT_OUT_ACK,SENDGRID_TEMPLATE_ALPHA_ANNOUNCEMENT,SENDGRID_TEMPLATE_BOARDING_CONFIRMATION,SENDGRID_TEMPLATE_OFFER_CONGRATS,SENDGRID_TEMPLATE_EXEC_PREBOARD,SENDGRID_TEMPLATE_BOARDING_PASS_FREE,SENDGRID_TEMPLATE_BOARDING_PASS_PAID,SENDGRID_TEMPLATE_BOARDING_INSTRUCTIONS_FREE,SENDGRID_TEMPLATE_BOARDING_INSTRUCTIONS_PAID,SENDGRID_TEMPLATE_WELCOME,SENDGRID_TEMPLATE_SPONSORED_APPROVED,SENDGRID_TEMPLATE_VIP_BOARDING_PASS,SENDGRID_TEMPLATE_VIP_BOARDING_INSTRUCTIONS,SENDGRID_TEMPLATE_ALPHA_SEAT_CONFIRM,SENDGRID_TEMPLATE_PREBOARD_NURTURE"
  SECRETS_SCAN_OMIT_PATHS = "supabase/migrations,sendgrid-templates,docs/email,.env.example,CHANGELOG.md,index.html.backup,index.html.cyan-snapshot,netlify/functions/sendgrid-templates.js"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=UTF-8"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

[[redirects]]
  from = "/api/seat-status"
  to = "/.netlify/functions/seat-status"
  status = 200

[[redirects]]
  from = "/api/seat-request"
  to = "/.netlify/functions/seat-request"
  status = 200

# One Page Studio — serve /Studio from the Studio subfolder
[[redirects]]
  from = "/ResumeOnePageStudio"
  to = "/Studio"
  status = 301
  force = true

[[redirects]]
  from = "/ResumeOnePageStudio/*"
  to = "/Studio/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/request-seat"
  to = "/request-seat.html"
  status = 200

[[redirects]]
  from = "/request-seat/"
  to = "/request-seat.html"
  status = 200

[[redirects]]
  from = "/OnboardingPassport"
  to = "/onboardingpassport/"
  status = 200
  force = true

[[redirects]]
  from = "/OnboardingPassport/*"
  to = "/onboardingpassport/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/set-departure"
  to = "/.netlify/functions/set-departure"
  status = 200

[[redirects]]
  from = "/Dashboard"
  to = "/?status=boarded"
  status = 200
  force = true

[[redirects]]
  from = "/Dashboard/*"
  to = "/?status=boarded"
  status = 200
  force = true

[[redirects]]
  from = "/dashboard"
  to = "/?status=boarded"
  status = 200
  force = true

[[redirects]]
  from = "/dashboard/*"
  to = "/?status=boarded"
  status = 200
  force = true

[[redirects]]
  from = "/Passengers"
  to = "/"
  status = 200
  force = true

[[redirects]]
  from = "/Passengers/*"
  to = "/"
  status = 200
  force = true

[[redirects]]
  from = "/FlightLog"
  to = "/"
  status = 200
  force = true

[[redirects]]
  from = "/FlightLog/*"
  to = "/"
  status = 200
  force = true

[[redirects]]
  from = "/Applications"
  to = "/"
  status = 200
  force = true

[[redirects]]
  from = "/Applications/*"
  to = "/"
  status = 200
  force = true

[[redirects]]
  from = "/InterviewsAndFollowUps"
  to = "/"
  status = 200
  force = true

[[redirects]]
  from = "/InterviewsAndFollowUps/*"
  to = "/"
  status = 200
  force = true

[[redirects]]
  from = "/CommandCenter"
  to = "/"
  status = 200
  force = true

[[redirects]]
  from = "/CommandCenter/*"
  to = "/"
  status = 200
  force = true

[[redirects]]
  from = "/Studio"
  to = "/"
  status = 200
  force = true

[[redirects]]
  from = "/Studio/*"
  to = "/"
  status = 200
  force = true
# Beehiiv Issue 2 — flight/cohort sync audit runner (dry_run by default)
[[redirects]]
  from = "/api/beehiiv-sync"
  to = "/.netlify/functions/beehiiv-sync"
  status = 200

[functions."signalwelcome-runner"]
  schedule = "0 * * * *"
