# ── Admin Tower — BLOCKER-03 / SEC-06: Approve/Deny + waitlist manifest ───────

[[redirects]]
  from = "/api/admin-approve"
  to = "/.netlify/functions/admin-approve"
  status = 200

[[redirects]]
  from = "/api/admin-deny"
  to = "/.netlify/functions/admin-deny"
  status = 200

[[redirects]]
  from = "/api/waitlist-manifest"
  to = "/.netlify/functions/waitlist-manifest"
  status = 200

[[redirects]]
  from = "/api/demo-sendgrid"
  to = "/.netlify/functions/demo-sendgrid"
  status = 200

[[redirects]]
  from = "/api/beehiiv-sync"
  to = "/.netlify/functions/beehiiv-sync"
  status = 200

# BLOCKER-08 / PR #56: Alignment Loop — Notion ↔ SaaS drift detection + repair
# Webhook: POST /api/alignment-loop (manual) or cron (scheduled)
# We keep the scheduled function but map the manual trigger to a non-scheduled one.
[[redirects]]
  from = "/api/alignment-loop"
  to = "/.netlify/functions/manual-alignment-loop"
  status = 200

[[redirects]]
  from = "/api/manual-alignment-loop"
  to = "/.netlify/functions/manual-alignment-loop"
  status = 200

[functions."alignment-loop"]
  schedule = "*/5 * * * *"

# signalwelcome_v1 — Beehiiv → SendGrid welcome runner (SEC-06 gated in function code)
[[redirects]]
  from = "/api/signalwelcome-runner"
  to = "/.netlify/functions/signalwelcome-runner"
  status = 200

[functions."signalwelcome-runner"]
  schedule = "0 * * * *"

# ── Static page rewrites ──────────────────────────────────────────────────────

# Passenger self-seat-selection entry point
[[redirects]]
  from = "/seat-selection"
  to = "/seat-selection.html"
  status = 200

[[redirects]]
  from = "/request-seat"
  to = "/request-seat.html"
  status = 200

[[redirects]]
  from = "/request-seat/"
  to = "/request-seat.html"
  status = 200

# ── Legacy / alias redirects ──────────────────────────────────────────────────

# One Page Studio — serve /Studio from the Studio subfolder
[[redirects]]
  from = "/ResumeOnePageStudio"
  to = "/Studio"
  status = 301
  force = true

[[redirects]]
  from = "/ResumeOnePageStudio/*"
  to = "/Studio/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/OnboardingPassport"
  to = "/onboardingpassport/"
  status = 200
  force = true

[[redirects]]
  from = "/OnboardingPassport/*"
  to = "/onboardingpassport/:splat"
  status = 200
  force = true

# /Studio is served directly from Studio/index.html. Do not force-rewrite it to /,
# because boarding handoff URLs preserve seat_id/tuj_code on the Studio route.
[[redirects]]
  from = "/Studio"
  to = "/Studio/"
  status = 200
  force = true

[[redirects]]
  from = "/Studio/*"
  to = "/Studio/:splat"
  status = 200
  force = true

# ── Dashboard / SPA shell routes ──────────────────────────────────────────────

[[redirects]]
  from = "/Dashboard"
  to = "/?status=boarded"
  status = 200

[[redirects]]
  from = "/Dashboard/*"
  to = "/?status=boarded"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/?status=boarded"
  status = 200

[[redirects]]
  from = "/dashboard/*"
  to = "/?status=boarded"
  status = 200

# Catch-all SPA rewrite: all other paths serve the root index.html
[[redirects]]
  from = "/*"
  to = "/"
  status = 200
