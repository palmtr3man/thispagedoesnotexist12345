[[redirects]]
  from = "/Dashboard"
  to = "/?status=boarded"
  status = 200

[[redirects]]
  from = "/Dashboard/*"
  to = "/?status=boarded"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/?status=boarded"
  status = 200

[[redirects]]
  from = "/dashboard/*"
  to = "/?status=boarded"
  status = 200

[[redirects]]
  from = "/Passengers"
  to = "/"
  status = 200
  force = true

[[redirects]]
