[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # Netlify secret-scan exclusions.
  #
  # Real secrets (SENDGRID_API_KEY, BEEHIIV_API_KEY, SUPABASE_SERVICE_ROLE_KEY,
  # ADMIN_SECRET, AGE_TOKEN_SECRET, ALIGNMENT_*_SECRET, BASE44APIKEY,
  # BASE44_API_KEY, NOTION_API_KEY, NOTION_SECRET, NETLIFY_API_KEY, PILOT_TOKEN)
  # are intentionally NOT listed here and remain scanned.
  #
  # The keys below are public, non-secret identifiers (template IDs, publication
  # IDs, database IDs, URLs, flight codes, flags) that appear as defaults or
  # documentation strings throughout the codebase and trigger false positives.
  SECRETS_SCAN_OMIT_KEYS = "NOTION_SEAT_DB_ID,NOTION_DRIFT_REPORT_DB_ID,NOTION_JD_PIPELINE_DB_ID,NOTION_SEAT_REQUEST_DATABASE_ID,BEEHIIV_PUB_ID,ACTIVE_FLIGHT_CODE,SENDGRID_FROM_EMAIL,SENDGRID_FROM_NAME,SENDGRID_TEMPLATE_WELCOME,SENDGRID_TEMPLATE_SEAT_REQUEST,SENDGRID_TEMPLATE_INTERNAL_SIGNUP,SENDGRID_TEMPLATE_NEXT_FLIGHT_WAITLIST,SENDGRID_TEMPLATE_OPT_OUT_ACK,SENDGRID_TEMPLATE_ALPHA_ANNOUNCEMENT,SENDGRID_TEMPLATE_ALPHA_SEAT_CONFIRM,SENDGRID_TEMPLATE_BOARDING_CONFIRMATION,SENDGRID_TEMPLATE_OFFER_CONGRATS,SENDGRID_TEMPLATE_EXEC_PREBOARD,SENDGRID_TEMPLATE_BOARDING_PASS_FREE,SENDGRID_TEMPLATE_BOARDING_PASS_PAID,SENDGRID_TEMPLATE_BOARDING_INSTRUCTIONS_FREE,SENDGRID_TEMPLATE_BOARDING_INSTRUCTIONS_PAID,SENDGRID_TEMPLATE_VIP_BOARDING_PASS,SENDGRID_TEMPLATE_VIP_BOARDING_INSTRUCTIONS,SENDGRID_TEMPLATE_PREBOARD_NURTURE,SENDGRID_TEMPLATE_SPONSORED_APPROVED,SENDGRID_UNSUBSCRIBE_GROUP_MARKETING,SENDGRID_UNSUBSCRIBE_GROUP_TRANSACTIONAL,SENDGRID_DEBUG,SENDGRID_STRICT_TEMPLATE_CHECK,SENDPILOT_API,PLATFORM_URL,SIGNAL_URL,PASSPORT_URL,SITE_URL,ADMIN_ORIGIN,NETLIFY_SITE_ID,SUPABASE_URL,BASE44_SEAT_REQUEST_URL,BASE44_COHORT_STATUS_URL,BASE44_SEAT_URL,BASE44_SEAT_LIST_URL,BASE44_SET_DEPARTURE_URL,BASE44_USER_URL,BASE44_APPLICATION_URL,BMAC_SUPPORT_URL,ALPHA_MODE,PUBLIC_GATE_STATE,SIGNALWELCOME_ENABLED,SIGNALWELCOME_DRY_RUN,SIGNALWELCOME_COHORT_SIZE,SIGNALWELCOME_DAILY_CAP,SIGNALWELCOME_SENT_TAG,SIGNALWELCOME_CANDIDATE_TAG"
  # Paths excluded from secret scanning. All entries are either non-deployed
  # historical artifacts (backups, snapshots, changelogs, the env template, the
  # docs folder) or template-documentation HTML that references public
  # SendGrid template IDs / Beehiiv pub IDs as illustrative payload examples.
  # Active runtime code under netlify/functions remains scanned.
  SECRETS_SCAN_OMIT_PATHS = "supabase/migrations,sendgrid-templates,index.html.backup,index.html.cyan-snapshot,CHANGELOG.md,.env.example,docs"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=UTF-8"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

[[redirects]]
  from = "/api/seat-status"
  to = "/.netlify/functions/seat-status"
  status = 200

[[redirects]]
  from = "/api/seat-request"
  to = "/.netlify/functions/seat-request"
  status = 200

# Canonical entry point — /request-seat → seat request form
[[redirects]]
  from = "/request-seat"
  to = "/#seat-request-form"
  status = 301

# One Page Studio — serve /Studio from the Studio subfolder
[[redirects]]
  from = "/ResumeOnePageStudio"
  to = "/Studio"
  status = 301
  force = true

[[redirects]]
  from = "/ResumeOnePageStudio/*"
  to = "/Studio/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/api/set-departure"
  to = "/.netlify/functions/set-departure"
  status = 200

[[redirects]]
  from = "/api/verify-age"
  to = "/.netlify/functions/verify-age"
  status = 200

[[redirects]]
  from = "/api/seat/:id"
  to = "/.netlify/functions/seat?id=:id"
  status = 200

[[redirects]]
  from = "/api/seat"
  to = "/.netlify/functions/seat"
  status = 200


# Admin Tower — BLOCKER-03: Approve/Deny Flow
# Secured by x-admin-secret header (ADMIN_SECRET env var)
[[redirects]]
  from = "/api/admin-approve"
  to = "/.netlify/functions/admin-approve"
  status = 200

[[redirects]]
  from = "/api/admin-deny"
  to = "/.netlify/functions/admin-deny"
  status = 200

[[redirects]]
  from = "/api/waitlist-manifest"
  to = "/.netlify/functions/waitlist-manifest"
  status = 200

# Passenger Door — BLOCKER-07: Newsletter Landing + TUJ Seat Gate + ResumeFitCheck
# Receives passengers from the .us newsletter boarding_pass deep-link:
#   https://www.thispagedoesnotexist12345.com/door?seat_id=TUJ-XXXXXX
# Validates seat_id via /api/seat, then routes to Base44 ResumeFitCheck.
[[redirects]]
  from = "/door"
  to = "/door.html"
  status = 200

# BLOCKER-08: Alignment Loop — Notion ↔ SaaS Drift Detection + Repair
# Webhook trigger: POST /api/alignment-loop with x-webhook-secret header
# Cron trigger: every 5 minutes via Netlify scheduled functions for PAL-21 Application sync
[[redirects]]
  from = "/api/alignment-loop"
  to = "/.netlify/functions/alignment-loop"
  status = 200

[functions."alignment-loop"]
  schedule = "*/5 * * * *"

# signalwelcome_v1 — Beehiiv → SendGrid welcome runner for Gemini.
# Scheduled polling is cohort-gated in code and sends only when at least 5 eligible active subscribers exist.
[[redirects]]
  from = "/api/signalwelcome-runner"
  to = "/.netlify/functions/signalwelcome-runner"
  status = 200

[functions."signalwelcome-runner"]
  schedule = "0 * * * *"
