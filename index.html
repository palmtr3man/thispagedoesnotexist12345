<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Ultimate Journey – Career Optimization Platform</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Black Glass Theme */
    body.black-glass {
      background: #0A0A0A;
    }

    body.black-glass .container {
      background: rgba(10, 10, 10, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    body.black-glass h1 {
      color: #00D9FF;
    }

    body.black-glass .links a,
    body.black-glass .btn {
      background: #00D9FF;
      color: #0A0A0A;
    }

    body.black-glass .links a:hover,
    body.black-glass .btn:hover {
      box-shadow: 0 0 15px #00D9FF;
    }

    .container {
      max-width: 700px;
      width: 90%;
      margin: 0 auto;
      padding: 3rem 2rem;
      border-radius: 16px;
      text-align: center;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 1rem;
      opacity: 0.6;
      margin-bottom: 2rem;
    }

    /* Cyberpunk status section */
    .status-section {
      position: relative;
      border: 1px solid rgba(0, 217, 255, 0.3);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      overflow: hidden;
      text-align: left;
    }

    .status-scanlines {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 217, 255, 0.02) 2px,
        rgba(0, 217, 255, 0.02) 4px
      );
      pointer-events: none;
    }

    .status-title {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .status-title-label {
      opacity: 0.75;
    }

    .badge {
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
      font-size: 0.75rem;
      border: 1px solid rgba(0, 217, 255, 0.5);
      background: rgba(0, 217, 255, 0.12);
      color: #00D9FF;
      white-space: nowrap;
    }
