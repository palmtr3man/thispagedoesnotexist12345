<!--
  Render-blocking scripts deferred.
  Non-critical scripts (black-glass helpers) loaded with defer.
  Base44 app bundle loaded with defer so it does not block first paint.
-->
<script>
  // Task 9: Reduce TBT — split init into yielded chunks
  function yieldToMain() {
    return new Promise(resolve => {
      if (typeof scheduler !== 'undefined' && scheduler.postTask) {
        scheduler.postTask(resolve, { priority: 'background' });
      } else {
        setTimeout(resolve, 0);
      }
    });
  }

  async function initApp() {
    // Chunk 1: DOM-ready baseline setup
    const seatCountEl = document.getElementById('seat-count');
    const seatLabelEl = document.getElementById('seat-count-label');

    await yieldToMain();

    // Chunk 2: Seat status fetch (non-blocking)
    try {
      const res = await fetch('/api/seat-status');
      if (res.ok) {
        const data = await res.json();
        if (seatCountEl && data.seats_remaining !== undefined) {
          seatCountEl.textContent = data.seats_remaining;
          seatCountEl.style.display = 'inline';
          if (seatLabelEl) seatLabelEl.style.display = 'inline';
        }
      }
    } catch (e) {
      // silently fail — seat count is a progressive enhancement
    }

    await yieldToMain();

    // Chunk 3: Lazy-load Base44 app bundle after main thread is free
    // Task 10: Pass app-id via data attribute so Base44 SDK bootstraps
    // an authenticated session internally, preventing 403s on
    // /entities/User/me and public-settings from unauthenticated context.
    const script = document.createElement('script');
    script.src = 'https://cdn.base44.com/sdk/latest/app-loader.min.js';
    script.defer = true;
    script.setAttribute('data-app-id', '697140e628131a06045ebd18');
    script.setAttribute('data-auto-init', 'true');
    document.body.appendChild(script);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initApp);
  } else {
    initApp();
  }
</script>

<!-- Canvas hero animation script (flight-path particles) -->
<script>
  (function () {
    if (new Date() < new Date('2026-04-01T00:00:00')) return;
    var canvas = document.getElementById('hero-canvas');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var raf;
    var particles = [];
    var PARTICLE_COUNT = 55;
    var ACCENT = { r: 0, g: 217, b: 255 }; // #00D9FF — matches site header accent

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function randomBetween(a, b) {
      return a + Math.random() * (b - a);
    }

    function createParticle() {
      var angle = randomBetween(0, Math.PI * 2);
      var speed = randomBetween(0.15, 0.55);
      return {
        x:     randomBetween(0, canvas.width),
        y:     randomBetween(0, canvas.height),
        vx:    Math.cos(angle) * speed,
        vy:    Math.sin(angle) * speed,
        size:  randomBetween(1, 2.5),
        alpha: randomBetween(0.06, 0.28),
        trail: []
      };
    }

    function initParticles() {
      particles = [];
      for (var i = 0; i < PARTICLE_COUNT; i++) {
        particles.push(createParticle());
      }
    }

    function drawFrame() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.trail.push({ x: p.x, y: p.y });
        if (p.trail.length > 18) p.trail.shift();
        if (p.x < -10)               p.x = canvas.width  + 10;
        if (p.x > canvas.width  + 10)  p.x = -10;
        if (p.y < -10)               p.y = canvas.height + 10;
        if (p.y > canvas.height + 10)  p.y = -10;
        if (p.trail.length > 1) {
          ctx.beginPath();
          ctx.moveTo(p.trail[0].x, p.trail[0].y);
          for (var t = 1; t < p.trail.length; t++) {
            ctx.lineTo(p.trail[t].x, p.trail[t].y);
          }
          ctx.strokeStyle = 'rgba(' + ACCENT.r + ',' + ACCENT.g + ',' + ACCENT.b + ',' + (p.alpha * 0.4) + ')';
          ctx.lineWidth = p.size * 0.5;
          ctx.stroke();
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(' + ACCENT.r + ',' + ACCENT.g + ',' + ACCENT.b + ',' + p.alpha + ')';
        ctx.fill();
      }
      raf = requestAnimationFrame(drawFrame);
    }

    function start() {
      resize();
      initParticles();
      canvas.classList.add('ready');
      drawFrame();
    }

    window.addEventListener('resize', function () { resize(); initParticles(); });
    document.addEventListener('visibilitychange', function () {
      if (document.hidden) { cancelAnimationFrame(raf); } else { drawFrame(); }
    });

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', start);
    } else {
      start();
    }
  })();
</script>
