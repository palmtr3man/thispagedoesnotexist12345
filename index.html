<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Ultimate Journey – Career Optimization Platform</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Black Glass Theme */
    body.black-glass {
      background: #0A0A0A;
    }

    body.black-glass .container {
      background: rgba(10, 10, 10, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    body.black-glass h1 {
      color: #00D9FF;
    }

    body.black-glass .links a,
    body.black-glass .btn {
      background: #00D9FF;
      color: #0A0A0A;
    }

    body.black-glass .links a:hover,
    body.black-glass .btn:hover {
      box-shadow: 0 0 15px #00D9FF;
    }

    .container {
      max-width: 700px;
      width: 90%;
      margin: 0 auto;
      padding: 3rem 2rem;
      border-radius: 16px;
      text-align: center;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 1rem;
      opacity: 0.6;
      margin-bottom: 2rem;
    }

    /* Cyberpunk status section */
    .status-section {
      position: relative;
      border: 1px solid rgba(0, 217, 255, 0.3);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      overflow: hidden;
      text-align: left;
    }

    .status-scanlines {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 217, 255, 0.02) 2px,
        rgba(0, 217, 255, 0.02) 4px
      );
      pointer-events: none;
    }

    .status-title {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .status-title-label {
      opacity: 0.75;
    }

    .badge {
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
      font-size: 0.75rem;
      border: 1px solid rgba(0, 217, 255, 0.5);
      background: rgba(0, 217, 255, 0.12);
      color: #00D9FF;
      white-space: nowrap;
    }

    .badge--highlight {
      border-color: rgba(0, 255, 170, 0.6);
      background: rgba(0, 255, 170, 0.15);
      color: #00FFAA;
    }

    .badge--meta {
      opacity: 0.7;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text {
      font-size: 0.9rem;
      line-height: 1.7;
      opacity: 0.85;
      margin-bottom: 1.5rem;
    }

    .status-text .date {
      color: #00D9FF;
      opacity: 0.8;
    }

    /* Hoverable path keywords */
    .status-text .path {
      color: #00D9FF;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-block;
      position: relative;
    }

    .status-text .path::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 1px;
      background: #00D9FF;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .status-text .path:hover {
      color: #fff;
      text-shadow: 0 0 12px rgba(0, 217, 255, 0.9);
      transform: scale(1.05);
    }

    .status-text .path:hover::after {
      opacity: 1;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      letter-spacing: 0.05em;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-signal {
      background: #00D9FF;
      color: #0A0A0A;
    }

    .btn-signal:hover {
      box-shadow: 0 0 20px rgba(0, 217, 255, 0.6);
    }

    .btn-systems {
      background: rgba(0, 217, 255, 0.15);
      color: #00D9FF;
      border: 1px solid rgba(0, 217, 255, 0.4);
    }

    .btn-systems:hover {
      background: rgba(0, 217, 255, 0.25);
      box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
    }

    .btn-support {
      background: rgba(255, 221, 0, 0.15);
      color: #FFD700;
      border: 1px solid rgba(255, 215, 0, 0.4);
    }

    .btn-support:hover {
      background: rgba(255, 221, 0, 0.25);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
    }

    footer {
      font-size: 0.75rem;
      opacity: 0.4;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body class="black-glass">
  <div class="container">
    <h1>🚀 The Ultimate Journey</h1>
    <p class="subtitle">Career Optimization Platform</p>

    <!-- CYBERPUNK STATUS SECTION -->

      <div class="status-scanlines"></div>

      <div class="status-title">
        <span class="status-title-label">Loading Dock:</span>
        <span class="badge badge--status">OPEN</span>
      </div>

      <div class="status-title">
        <span class="status-title-label">Next Flight:</span>
        <span class="badge badge--flight">FL 030126 🚀</span>
      </div>

      <div class="status-title">
        <span class="status-title-label">Status:</span>
        <span class="badge badge--highlight">
          Early Arrival — Ahead of Schedule ✈️⚡
        </span>
      </div>

      <div class="status-title">
        <span class="status-title-label">Carrier:</span>
        <span class="badge badge--carrier">PageForward Airways</span>
         <span class="status-title-label">Arrival Time:</span>
        <span class="badge badge--meta">TBD</span>
      </div>
    </div>

    <p
